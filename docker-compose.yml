version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: duty_shuffle_db
    environment:
      POSTGRES_DB: duty_shuffle_development
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: duty_shuffle_web
    command: /app/docker-entrypoint.sh
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/duty_shuffle_development
      DATABASE_URL_TEST: postgresql://postgres:password@db:5432/duty_shuffle_test
      RAILS_ENV: development
      NODE_ENV: development
      VITE_RUBY_HOST: 0.0.0.0
      VITE_RUBY_SKIP_COMPATIBILITY_CHECK: "true"
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle_cache:
  node_modules:

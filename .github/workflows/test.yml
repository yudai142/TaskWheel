name: Test Suite (JavaScript & Rails)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read

jobs:
  javascript-tests:
    name: React / TypeScript Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run React tests
        run: npm test -- --run

  rails-tests:
    name: Rails / RSpec Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: task_wheel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        ruby-version: [3.2.11]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Add platform to Gemfile.lock and install dependencies
        run: |
          bundle lock --add-platform x86_64-linux || true
          bundle install --jobs 4

      - name: Clear npm cache and reinstall Node dependencies
        run: |
          npm cache clean --force
          npm install

      - name: Set up Node.js for Rails assets
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup database
        env:
          RAILS_ENV: test
          DATABASE_URL_TEST: postgresql://postgres@localhost/task_wheel_test
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: Run Rails tests
        env:
          RAILS_ENV: test
          DATABASE_URL_TEST: postgresql://postgres@localhost/task_wheel_test
        run: bundle exec rspec spec/requests/ -f progress

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [javascript-tests, rails-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "✅ JavaScript Tests: ${{ needs.javascript-tests.result }}"
          echo "✅ Rails Tests: ${{ needs.rails-tests.result }}"
          
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jsResult = '${{ needs.javascript-tests.result }}';
            const railsResult = '${{ needs.rails-tests.result }}';
            
            let summary = '## 🧪 Test Results\n\n';
            summary += jsResult === 'success' ? '✅ **React/TypeScript Tests**: Passed\n' : '❌ **React/TypeScript Tests**: Failed\n';
            summary += railsResult === 'success' ? '✅ **Rails Tests**: Passed\n' : '❌ **Rails Tests**: Failed\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: duty_shuffle_db
    environment:
      POSTGRES_DB: duty_shuffle_development
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "-c max_connections=1000"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: duty_shuffle_web
    command: bundle exec rails s -b 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/duty_shuffle_development
      RAILS_ENV: development
      NODE_ENV: development
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle_cache:

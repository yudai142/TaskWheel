version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: duty_shuffle_db
    environment:
      POSTGRES_DB: duty_shuffle_development
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  webpack:
    build: .
    container_name: duty_shuffle_webpack
    command: sh -c "yarn install && yarn dev"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bundle_cache:/usr/local/bundle
    environment:
      NODE_ENV: development
      RAILS_ENV: development

  web:
    build: .
    container_name: duty_shuffle_web
    command: sh -c "bundle exec rails db:create db:migrate 2>/dev/null || true && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/duty_shuffle_development
      DB_HOST: db
      DB_PORT: 5432
      RAILS_ENV: development
      NODE_ENV: development
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
